name: Deploy to GitHub Pages

# Builds apps/web and publishes it to GitHub Pages whenever any tag
# (e.g. 0.0.1, created by release.sh) is pushed. Also runnable on demand.
on:
  push:
    tags:
      - '**'
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # GitHub Pages has no SPA rewrite: a deep link like /kids-games/play/match
      # would 404. Serving the app as 404.html makes Pages return it for any
      # unknown path (the URL is preserved, so BrowserRouter resolves the route).
      - name: Add SPA fallback
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
